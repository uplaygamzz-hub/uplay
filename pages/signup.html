<script>
    document.addEventListener('DOMContentLoaded', () => {
        const slider = document.querySelector('.tournament-cards');
        const dots = document.querySelectorAll('.dot');

        // 1. Update active dot based on scroll position
        slider.addEventListener('scroll', () => {
            const scrollLeft = slider.scrollLeft;
            const cardWidth = slider.clientWidth;
            
            // Calculate which card is closest to the center
            const activeIndex = Math.round(scrollLeft / cardWidth);

            // Update classes on dots
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === activeIndex);
            });
        });

        // 2. Allow clicking a dot to snap to that specific game card
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                slider.scrollTo({
                    left: slider.clientWidth * index,
                    behavior: 'smooth'
                });
            });
        });
    });
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    
    // Safely init AOS if it exists
    if (typeof AOS !== 'undefined') {
        AOS.init();
    }

    // ==========================================
    // MOBILE NAV TOGGLE
    // ==========================================
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    const body = document.body;

    if (navToggle && navMenu) {
        navToggle.addEventListener('click', () => {
            // Toggle animation and menu
            navToggle.classList.toggle('active');
            navMenu.classList.toggle('active');

            // Stop background scrolling
            if (navMenu.classList.contains('active')) {
                body.style.overflow = 'hidden';
            } else {
                body.style.overflow = '';
            }
        });

        // Close menu when a link is clicked
        const navLinks = document.querySelectorAll('.mobile-menu a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navToggle.classList.remove('active');
                navMenu.classList.remove('active');
                body.style.overflow = '';
            });
        });
    }
});
</script>

  <script>
    function validateStep1() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!username || !email || !password || !confirmPassword) {
        alert('Please fill in all fields');
        return false;
      }

      // Validate username
      if (!/^[a-zA-Z0-9]{3,20}$/.test(username)) {
        alert('Username must be 3-20 characters (letters and numbers only)');
        return false;
      }

      // Validate password
      if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return false;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return false;
      }

      // Check if email already exists
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      if (users.some(u => u.email === email)) {
        alert('Email already registered. Please login or use a different email.');
        return false;
      }

      // Check if username already exists
      if (users.some(u => u.username === username)) {
        alert('Username already taken. Please choose another.');
        return false;
      }

      return true;
    }

    function showLoading() {
      const overlay = document.getElementById('loadingOverlay');
      overlay.style.display = 'flex';
      const btn = document.getElementById('signupBtn');
      if (btn) {
        btn.disabled = true;
        btn.setAttribute('aria-busy', 'true');
      }
      // auto-hide after 10s if stuck
      // clearTimeout(window.loadingTimeout);
      // window.loadingTimeout = setTimeout(hideLoading, 100);
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
      const btn = document.getElementById('signupBtn');
      if (btn) {
        btn.disabled = false;
        btn.removeAttribute('aria-busy');
      }
      clearTimeout(window.loadingTimeout);
    }
  </script>
