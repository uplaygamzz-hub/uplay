<script>
    document.addEventListener('DOMContentLoaded', () => {
        const slider = document.querySelector('.tournament-cards');
        const dots = document.querySelectorAll('.dot');

        // 1. Update active dot based on scroll position
        slider.addEventListener('scroll', () => {
            const scrollLeft = slider.scrollLeft;
            const cardWidth = slider.clientWidth;
            
            // Calculate which card is closest to the center
            const activeIndex = Math.round(scrollLeft / cardWidth);

            // Update classes on dots
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === activeIndex);
            });
        });

        // 2. Allow clicking a dot to snap to that specific game card
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                slider.scrollTo({
                    left: slider.clientWidth * index,
                    behavior: 'smooth'
                });
            });
        });
    });
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    
    // Safely init AOS if it exists
    if (typeof AOS !== 'undefined') {
        AOS.init();
    }

    // ==========================================
    // MOBILE NAV TOGGLE
    // ==========================================
    const navToggle = document.getElementById('nav-toggle');
    const navMenu = document.getElementById('nav-menu');
    const body = document.body;

    if (navToggle && navMenu) {
        navToggle.addEventListener('click', () => {
            // Toggle animation and menu
            navToggle.classList.toggle('active');
            navMenu.classList.toggle('active');

            // Stop background scrolling
            if (navMenu.classList.contains('active')) {
                body.style.overflow = 'hidden';
            } else {
                body.style.overflow = '';
            }
        });

        // Close menu when a link is clicked
        const navLinks = document.querySelectorAll('.mobile-menu a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navToggle.classList.remove('active');
                navMenu.classList.remove('active');
                body.style.overflow = '';
            });
        });
    }
});
</script>
