<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uPlay - Sign Up</title>
    <link sizes="32x32" rel="icon" href="../images/logo/pad-logo-title.png" type="image/png">

    <!-- Fonts: Orbitron for Headings, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* =========================================
           === #MAIN STYLE ===
           ========================================= */
        :root {
            --UPlay-yellow: #ffcc00;
            --UPlay-yellow-hover: #e6b800;
            --font-heading: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
            --bg-base: #121212;
            --bg-surface: #1c1c1c;
            --bg-sidebar: #181818;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --success-color: #10b981;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
            --in-game-color: #a855f7;
        }

        body.light-mode {
            --bg-base: #f4f7fb;
            --bg-surface: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --hover-bg: #f3f4f6;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: var(--font-body); 
            background-color: var(--bg-base); 
            color: var(--text-primary);
            display: flex; 
            flex-direction: row; 
            height: 100vh; 
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a { 
            text-decoration: none; 
            color: inherit; 
        }

        ul { 
            list-style: none; 
        }

        button { 
            cursor: pointer; 
            font-family: inherit; 
            border: none; 
            background: none; 
            outline: none; 
        }

        /* --- Global Buttons --- */
        .btn-primary { 
            background-color: var(--UPlay-yellow); 
            color: #000; 
            padding: 10px 24px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px; 
            transition: 0.2s; 
            border: 1px solid var(--UPlay-yellow); 
            cursor: pointer;
            white-space: nowrap; 
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3); 
            background-color: var(--UPlay-yellow-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap; 
        }

        .btn-outline:hover {
            border-color: var(--text-secondary);
            background-color: var(--hover-bg);
        }

        /* --- SIDEBAR LOGIC --- */
        .sidebar-spacer { 
            width: 260px; 
            flex-shrink: 0; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .sidebar-spacer.collapsed { 
            width: 80px; 
        }

        .sidebar {
            position: fixed; 
            top: 0; 
            left: 0; 
            height: 100vh; 
            width: 260px;
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color);
            z-index: 105; 
            overflow-x: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-inner { 
            width: 260px; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }

        .sidebar.collapsed { 
            width: 80px; 
        }

        .sidebar.collapsed:hover { 
            width: 260px; 
            box-shadow: 10px 0 20px rgba(0, 0, 0, 0.4); 
        }

        .user-info, 
        .nav-section-title, 
        .nav-item span { 
            transition: opacity 0.2s ease; 
            opacity: 1; 
        }

        .sidebar.collapsed:not(:hover) .user-info, 
        .sidebar.collapsed:not(:hover) .nav-section-title, 
        .sidebar.collapsed:not(:hover) .nav-item span {
            opacity: 0; 
            pointer-events: none;
        }

        .sidebar-header { 
            height: 70px; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }

        .desktop-toggle { 
            color: var(--text-secondary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            transition: 0.2s; 
            flex-shrink: 0; 
        }

        .desktop-toggle:hover { 
            color: var(--text-primary); 
            background-color: var(--hover-bg); 
        }

        .user-widget { 
            padding: 24px 16px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            border-bottom: 1px solid var(--border-color); 
            text-decoration: none; 
            color: inherit; 
            transition: background-color 0.2s; 
        }

        .user-widget:hover { 
            background-color: var(--hover-bg); 
        }

        .user-widget img { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            border: 2px solid var(--UPlay-yellow); 
            flex-shrink: 0; 
            object-fit: cover;
        }

        .user-info h4 { 
            font-size: 14px; 
            margin-bottom: 4px; 
        }

        .user-info p { 
            font-size: 12px; 
            color: var(--UPlay-yellow); 
            font-weight: bold; 
        }

        .sidebar-nav { 
            padding: 20px 12px; 
            flex: 1; 
            overflow-y: auto; 
        }

        .nav-section-title { 
            font-size: 11px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 12px; 
            padding-left: 12px; 
            font-weight: 600; 
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px 18px; 
            border-radius: 8px; 
            color: var(--text-secondary); 
            margin-bottom: 4px; 
            transition: all 0.2s ease; 
            font-size: 14px; 
            font-weight: 500; 
        }

        .nav-item:hover, 
        .nav-item.active { 
            background-color: var(--hover-bg); 
            color: var(--text-primary); 
        }

        .nav-item.active { 
            color: var(--UPlay-yellow); 
            background-color: rgba(255, 204, 0, 0.05); 
        }

        .nav-item i { 
            width: 20px; 
            height: 20px; 
            flex-shrink: 0; 
        }

        .sidebar-footer { 
            padding: 20px 12px; 
            border-top: 1px solid var(--border-color); 
            flex-shrink: 0; 
        }

        .logout-item { 
            color: #ef4444; 
        }

        .logout-item:hover { 
            background-color: rgba(239, 68, 68, 0.1) !important; 
            color: #ef4444 !important; 
        }

        /* --- MAIN LAYOUT & TOPBAR --- */
        .main-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            width: 100%; 
        }

        .topbar { 
            height: 70px; 
            background-color: var(--bg-surface); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 24px; 
            flex-shrink: 0; 
            z-index: 101; 
        }

        .topbar-left { 
            display: flex; 
            align-items: center; 
            gap: 16px; 
        }

        .mobile-toggle { 
            display: none !important; 
            color: var(--text-primary); 
            width: 40px; 
            height: 40px; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
        }

        .topbar-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--UPlay-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar-logo img {
            height: 15px;
            padding: 0;
            rotate: 24deg;
        }       

        .topbar-right { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-left: auto; 
        }

        .icon-btn { 
            color: var(--text-secondary); 
            transition: color 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
        }

        .icon-btn:hover { 
            color: var(--text-primary); 
            background-color: var(--hover-bg); 
        }

        /* --- NOTIFICATIONS DROPDOWN --- */
        .notification-wrapper { 
            position: relative; 
        }

        .notification-badge { 
            position: absolute; 
            top: -2px; 
            right: -2px; 
            background-color: #ef4444; 
            color: white; 
            font-size: 10px; 
            font-weight: bold; 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid var(--bg-surface); 
            transition: transform 0.2s ease, opacity 0.2s ease; 
        }

        .notification-badge.hidden { 
            transform: scale(0); 
            opacity: 0; 
        }

        .notification-dropdown { 
            position: absolute; 
            top: 50px; 
            right: 0; 
            width: 340px; 
            background-color: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            display: flex; 
            flex-direction: column; 
            max-height: 80vh; 
            z-index: 1000; 
            opacity: 0; 
            visibility: hidden; 
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
            cursor: default; 
        }

        .notification-dropdown.show { 
            opacity: 1; 
            visibility: visible; 
            transform: translateY(0); 
        }

        .notif-header { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .notif-header h4 { 
            font-family: var(--font-heading); 
            font-size: 16px; 
            margin: 0; 
        }

        .notif-top-actions { 
            display: flex; 
            gap: 12px; 
        }

        .notif-action-btn { 
            color: var(--text-secondary); 
            transition: color 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .notif-action-btn:hover { 
            color: var(--UPlay-yellow); 
        }

        .notif-action-btn.delete-all:hover { 
            color: #ef4444; 
        }

        .notif-action-btn i { 
            width: 18px; 
            height: 18px; 
        }

        .notif-list { 
            overflow-y: auto; 
            padding: 8px 0; 
            flex: 1; 
        }

        .notif-item { 
            padding: 12px 20px; 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
            border-left: 3px solid transparent; 
            transition: background 0.2s; 
            cursor: pointer; 
            position: relative; 
        }

        .notif-item:hover { 
            background-color: var(--hover-bg); 
        }

        .notif-item.unread { 
            background-color: rgba(255, 204, 0, 0.05); 
            border-left-color: var(--UPlay-yellow); 
        }

        .notif-icon { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            background-color: var(--hover-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-primary); 
            flex-shrink: 0; 
        }

        .notif-item.unread .notif-icon { 
            background-color: rgba(255, 204, 0, 0.2); 
            color: var(--UPlay-yellow); 
        }

        .notif-content { 
            flex: 1; 
        }

        .notif-content h5 { 
            font-size: 13px; 
            margin-bottom: 4px; 
            color: var(--text-primary); 
        }

        .notif-content p { 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin: 0; 
            line-height: 1.4; 
        }

        .notif-time { 
            font-size: 10px; 
            color: var(--text-secondary); 
            margin-top: 6px; 
            display: block; 
        }

        .notif-item-actions { 
            position: relative; 
            margin-left: auto; 
            padding-left: 5px; 
        }

        .more-btn { 
            color: var(--text-secondary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            transition: background 0.2s, color 0.2s; 
        }

        .more-btn:hover { 
            background: var(--hover-bg); 
            color: var(--text-primary); 
        }

        .more-btn i { 
            width: 16px; 
            height: 16px; 
        }

        .notif-options { 
            position: absolute; 
            right: 0; 
            top: 100%; 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            width: 150px; 
            z-index: 1010; 
            display: none; 
            flex-direction: column; 
            padding: 6px; 
            margin-top: 4px; 
        }

        .notif-options.show { 
            display: flex; 
        }

        .opt-btn { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 8px 12px; 
            width: 100%; 
            text-align: left; 
            font-size: 12px; 
            font-weight: 500; 
            color: var(--text-secondary); 
            border-radius: 6px; 
            transition: 0.2s; 
        }

        .opt-btn i { 
            width: 14px; 
            height: 14px; 
        }

        .opt-btn:hover { 
            background: var(--hover-bg); 
            color: var(--text-primary); 
        }

        .opt-btn.delete-opt { 
            color: #ef4444; 
        }

        .opt-btn.delete-opt:hover { 
            background: rgba(239, 68, 68, 0.1); 
            color: #ef4444; 
        }

        .notif-item.unread .mark-unread-opt { 
            display: none; 
        }

        .notif-item:not(.unread) .mark-read-opt { 
            display: none; 
        }

        /* --- PROFILE DROPDOWN --- */
        .profile-wrapper { 
            position: relative; 
        }

        .profile-dropdown { 
            position: absolute; 
            top: 50px; 
            right: 0; 
            width: 240px; 
            background-color: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            opacity: 0; 
            visibility: hidden; 
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
            cursor: default; 
        }

        .profile-dropdown.show { 
            opacity: 1; 
            visibility: visible; 
            transform: translateY(0); 
        }

        .profile-header-info { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .profile-header-info img { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border: 2px solid var(--UPlay-yellow); 
            flex-shrink: 0; 
        }

        .profile-user-details h4 { 
            font-size: 14px; 
            margin-bottom: 2px; 
            color: var(--text-primary); 
            font-weight: 700; 
        }

        .profile-user-details p { 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin: 0; 
        }

        .profile-links { 
            padding: 8px 0; 
            display: flex; 
            flex-direction: column; 
            border-bottom: 1px solid var(--border-color); 
        }

        .profile-link-item { 
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text-secondary); 
            font-size: 13px; 
            font-weight: 500; 
            transition: 0.2s; 
            text-decoration: none; 
        }

        .profile-link-item:hover { 
            background-color: var(--hover-bg); 
            color: var(--text-primary); 
        }

        .profile-link-item i { 
            width: 16px; 
            height: 16px; 
        }

        .profile-logout { 
            padding: 8px 0; 
        }

        .profile-logout .profile-link-item { 
            color: #ef4444; 
        }

        .profile-logout .profile-link-item:hover { 
            background-color: rgba(239, 68, 68, 0.1); 
            color: #ef4444; 
        }

        /* --- GLOBAL TOAST NOTIFICATION & SPINNER --- */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--success-color);
            color: #fff;
            padding: 14px 24px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 3000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--UPlay-yellow);
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- MOBILE RESPONSIVENESS (SHELL) --- */
        @media (max-width: 768px) {
            .sidebar-spacer { 
                display: none; 
            }

            .mobile-toggle { 
                display: flex !important; 
            }

            .sidebar-header { 
                display: none; 
            }

            .sidebar { 
                transform: translateX(-100%); 
                width: 260px !important; 
            }

            .sidebar.show { 
                transform: translateX(0); 
            }

            .sidebar.collapsed:not(:hover) .user-info, 
            .sidebar.collapsed:not(:hover) .nav-section-title, 
            .sidebar.collapsed:not(:hover) .nav-item span { 
                opacity: 1; 
                pointer-events: auto; 
            }

            .topbar-left { 
                gap: 12px; 
            }
            
            .notification-dropdown { 
                position: fixed; 
                top: 70px; 
                right: 10px; 
                left: 10px; 
                width: auto; 
                max-height: calc(100vh - 90px); 
            }

            .profile-dropdown { 
                position: fixed; 
                top: 70px; 
                right: 10px; 
            }
        }
    </style>

    <style>
        /* =========================================
           === #SIGNUP STYLE ===
           ========================================= */

        /* Override ALFA body flex-direction row for the public layout */
        body {
            flex-direction: column !important;
            overflow-x: hidden !important;
            overflow-y: auto !important;
        }

        .main-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            position: relative;
            padding-top: 80px; /* Offset for fixed topbar */
            overflow: visible !important;
        }

        /* --- Public Top Navigation Bar (Shared with Index) --- */
        .public-topbar {
            height: 80px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: var(--card-shadow);
        }

        .public-topbar-left { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start;
            flex: 1;
        }

        .public-topbar-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--UPlay-yellow);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .public-topbar-logo img {
            height: 20px;
            padding: 0;
            rotate: 24deg;
        }       

        .public-topbar-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .public-nav-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .public-nav-link:hover, 
        .public-nav-link.active {
            color: var(--UPlay-yellow);
        }

        .public-topbar-right { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end;
            gap: 16px; 
            flex: 1;
        }

        .landing-mobile-menu-btn {
            display: none !important; 
            color: var(--text-primary);
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        /* --- Mobile Right Sidebar --- */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 260px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            z-index: 2000; 
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .mobile-sidebar.show {
            transform: translateX(0);
            box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1500 !important; 
            backdrop-filter: blur(4px) !important;
            -webkit-backdrop-filter: blur(4px) !important;
        }

        .sidebar-overlay.show {
            display: block;
        }

    <script>
        /* =========================================
           === #MAIN JS ===
           ========================================= */

        // 4. Theme Toggle Logic 
        const themeToggle = document.getElementById('themeToggle');
        const iconSun = document.querySelector('.icon-sun');
        const iconMoon = document.querySelector('.icon-moon');
        const body = document.body;

        function applyTheme(isLight) {
            if (isLight) {
                body.classList.add('light-mode');
                if(iconSun) iconSun.style.display = 'none';
                if(iconMoon) iconMoon.style.display = 'block';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                if(iconSun) iconSun.style.display = 'block';
                if(iconMoon) iconMoon.style.display = 'none';
                localStorage.setItem('theme', 'dark');
            }
        }

        applyTheme(localStorage.getItem('theme') === 'light');

        if(themeToggle) {
            themeToggle.addEventListener('click', () => {
                applyTheme(!body.classList.contains('light-mode'));
            });
        }
    </script>
    <script>
        /* =========================================
           === #SIGNUP JS ===
           ========================================= */
        // Inherits mobile menu logic from the index page
        const landingMobileMenuToggle = document.getElementById('landingMobileMenuToggle');
        const mobileSidebar = document.getElementById('mobileSidebar');
        const sidebarOverlayForLanding = document.getElementById('sidebarOverlay');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');

        function toggleLandingMobileSidebar() {
            if (mobileSidebar && sidebarOverlayForLanding) {
                mobileSidebar.classList.toggle('show');
                sidebarOverlayForLanding.classList.toggle('show');
            }
        }

        if (landingMobileMenuToggle) {
            landingMobileMenuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLandingMobileSidebar();
            });
        }

        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener('click', toggleLandingMobileSidebar);
        }

        if (sidebarOverlayForLanding) {
            sidebarOverlayForLanding.addEventListener('click', toggleLandingMobileSidebar);
        }

        // Password Visibility Toggle Logic
        function setupPasswordToggle(toggleId, inputId) {
            const toggleBtn = document.getElementById(toggleId);
            const passInput = document.getElementById(inputId);

            if (toggleBtn && passInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    
                    if (type === 'password') {
                        this.innerHTML = '<i data-lucide="eye"></i>';
                    } else {
                        this.innerHTML = '<i data-lucide="eye-off"></i>';
                    }
                    lucide.createIcons();
                });
            }
        }

        setupPasswordToggle('togglePassword', 'passwordInput');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPasswordInput');

        // Mock Form Submission
        const signupForm = document.getElementById('signupForm');
        if (signupForm) {
            signupForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Basic validation for matching passwords
                const pass = document.getElementById('passwordInput').value;
                const confirmPass = document.getElementById('confirmPasswordInput').value;

                if (pass !== confirmPass) {
                    alert('Passwords do not match!');
                    return;
                }

                const btn = signupForm.querySelector('.btn-submit');
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Creating Account...';
                btn.style.opacity = '0.8';
                btn.style.cursor = 'not-allowed';
                lucide.createIcons();

                // Simulate API call
                setTimeout(() => {
                    alert('Account created successfully! Redirecting to login...');
                    window.location.href = 'login.html';
                }, 1500);
            });
        }
    </script>
