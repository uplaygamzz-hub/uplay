<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uPlay - Sign Up</title>
    <link sizes="32x32" rel="icon" href="../images/logo/pad-logo-title.png" type="image/png">

    <!-- Fonts: Orbitron for Headings, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <!-- Signup CSS -->
    <link rel="stylesheet" href="../css/signup.css">

</head>
<body>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper">
        
        <!-- PUBLIC TOP NAVIGATION BAR (Matches Index) -->
        <header class="public-topbar">
            <!-- Left Side (Logo) -->
            <div class="public-topbar-left">
                <a href="../index.html" class="public-topbar-logo">
                    <img src="../images/logo/pad-logo.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"/>
                    <span style="display: none; margin-right: 8px;">🎮</span>
                    uPlay
                </a>
            </div>

            <!-- Center Side (Navigation Links) -->
            <div class="public-topbar-center">
                <a href="../index.html" class="public-nav-link">Home</a>
                <a href="#" class="public-nav-link">About</a>
                <a href="tournaments.html" class="public-nav-link">Tournaments</a>
                <a href="coming_soon.html" class="public-nav-link">Leaderboard</a>
            </div>

            <!-- Right Side (Actions) -->
            <div class="public-topbar-right">
                <!-- Theme Toggle -->
                <button class="icon-btn" id="themeToggle" title="Toggle Light/Dark Mode">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon" style="display: none;"></i>
                </button>

                <a href="login.html" class="btn-outline">Login</a>

                <!-- Mobile Menu Toggle -->
                <button class="landing-mobile-menu-btn icon-btn" id="landingMobileMenuToggle">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </header>

        <!-- Right-Side Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Right-Side Mobile Sidebar (Matches Index) -->
        <aside class="mobile-sidebar" id="mobileSidebar">
            <div class="sidebar-header">
                <button class="icon-btn" id="closeSidebarBtn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section-title">Navigation</div>
                <a href="../index.html" class="nav-item">
                    <i data-lucide="home"></i> <span>Home</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="info"></i> <span>About</span>
                </a>
                <a href="tournaments.html" class="nav-item">
                    <i data-lucide="trophy"></i> <span>Tournaments</span>
                </a>
                <a href="coming_soon.html" class="nav-item">
                    <i data-lucide="bar-chart-2"></i> <span>Leaderboard</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a href="login.html" class="btn-outline" style="width: 100%; justify-content: center;">Login</a>
            </div>
        </aside>

        <!-- AUTHENTICATION CONTENT -->
        <main class="auth-main">
            <div class="auth-card">
                
                <div class="auth-header">
                    <h1>Join the Arena</h1>
                    <p>Create your account and start dominating tournaments.</p>
                </div>

                <form id="signupForm">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label"><i data-lucide="user"></i>First Name</label>
                            <div class="form-input-wrapper">
                                <input type="text" class="form-input" placeholder="John" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <div class="form-input-wrapper">
                                <input type="text" class="form-input" placeholder="Doe" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i data-lucide="gamepad-2"></i>Username</label>
                        <div class="form-input-wrapper">
                            <input type="text" class="form-input" placeholder="ProSlayer99" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i data-lucide="mail"></i>Email</label>
                        <div class="form-input-wrapper">
                            <input type="email" class="form-input" placeholder="john@example.com" required>       
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i data-lucide="phone"></i>WhatsApp No</label>
                        <div class="form-input-wrapper">
                            <input type="tel" class="form-input" placeholder="+234 800 000 0000" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label"><i data-lucide="lock"></i>Password</label>
                            <div class="form-input-wrapper">
                                <input type="password" id="passwordInput" class="form-input" placeholder="Create password" required>
                                
                                <div class="password-toggle" id="togglePassword">
                                    <i data-lucide="eye"></i>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <div class="form-input-wrapper">
                                <input type="password" id="confirmPasswordInput" class="form-input" placeholder="Confirm password" required>
                                <div class="password-toggle" id="toggleConfirmPassword">
                                    <i data-lucide="eye"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="terms-wrapper">
                        <input type="checkbox" id="termsCheck" required>
                        <label for="termsCheck" class="terms-text">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">
                        Create Account <i data-lucide="arrow-right"></i>
                    </button>

                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log In</a>
                </div>

            </div>
        </main>

        <!-- Shared Footer -->
        <footer class="public-footer">
            <p>&copy; 2026 uPlayGammz. All rights reserved.</p>
        </footer>
    </div>

    <!-- SCRIPTS -->
    <script>
        // Render all icons on initial page load
        lucide.createIcons();
    </script>
    <script src="../java/main.js"></script>
    <script src="../java/signup.js"></script>
</body>
</html>
