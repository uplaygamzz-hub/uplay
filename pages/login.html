<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uPlay - Log In</title>
    <link sizes="32x32" rel="icon" href="../images/logo/pad-logo-title.png" type="image/png">

    <!-- Fonts: Orbitron for Headings, Inter for Body -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/signup&login.css">
</head>
<body>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper">
        
        <!-- PUBLIC TOP NAVIGATION BAR (Matches Index/Signup) -->
        <header class="public-topbar">
            <!-- Left Side (Logo) -->
            <div class="public-topbar-left">
                <a href="../index.html" class="public-topbar-logo">
                    <img src="../images/logo/pad-logo.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"/>
                    <span style="display: none; margin-right: 8px;">🎮</span>
                    uPlay
                </a>
            </div>

            <!-- Center Side (Navigation Links) -->
            <div class="public-topbar-center">
                <a href="../index.html" class="public-nav-link">Home</a>
                <a href="#" class="public-nav-link">About</a>
                <a href="tournaments.html" class="public-nav-link">Tournaments</a>
                <a href="coming_soon.html" class="public-nav-link">Leaderboard</a>
            </div>

            <!-- Right Side (Actions) -->
            <div class="public-topbar-right">
                <!-- Theme Toggle -->
                <button class="icon-btn" id="themeToggle" title="Toggle Light/Dark Mode">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon" style="display: none;"></i>
                </button>

                <a href="signup.html" class="btn-primary">Sign Up</a>

                <!-- Mobile Menu Toggle -->
                <button class="landing-mobile-menu-btn icon-btn" id="landingMobileMenuToggle">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </header>

        <!-- Right-Side Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Right-Side Mobile Sidebar (Matches Index) -->
        <aside class="mobile-sidebar" id="mobileSidebar">
            <div class="sidebar-header">
                <div class="public-topbar-left">
                    <a href="../index.html" class="public-topbar-logo">
                        <img src="../images/logo/pad-logo.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"/>
                        <span style="display: none; margin-right: 8px;">🎮</span>
                        uPlay
                    </a>
                </div>
                <button class="icon-btn" id="closeSidebarBtn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section-title">Navigation</div>
                <a href="../index.html" class="nav-item">
                    <i data-lucide="home"></i> <span>Home</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="info"></i> <span>About</span>
                </a>
                <a href="tournaments.html" class="nav-item">
                    <i data-lucide="trophy"></i> <span>Tournaments</span>
                </a>
                <a href="coming_soon.html" class="nav-item">
                    <i data-lucide="bar-chart-2"></i> <span>Leaderboard</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a href="signup.html" class="btn-primary" style="width: 100%; justify-content: center;">Sign Up</a>
            </div>
        </aside>

        <!-- AUTHENTICATION CONTENT -->
        <main class="auth-main">
            <div class="auth-card">
                
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Log in to your account and step into the arena.</p>
                </div>

                <form id="loginForm">

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="form-input-wrapper">
                            <input type="email" class="form-input" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="passwordInput" class="form-input" placeholder="Enter your password" required>
                            <div class="password-toggle" id="togglePassword">
                                <i data-lucide="eye"></i>
                            </div>
                        </div>
                    </div>

                    <div class="login-options">
                        <div class="terms-wrapper">
                            <input type="checkbox" id="rememberCheck">
                            <label for="rememberCheck" class="terms-text" style="cursor: pointer;">
                                Remember me
                            </label>
                        </div>
                        
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-submit">
                        Log In <i data-lucide="log-in"></i>
                    </button>

                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>

            </div>
        </main>

        <!-- Shared Footer -->
        <footer class="public-footer">
            <p>&copy; 2026 uPlayGammz. All rights reserved.</p>
        </footer>
    </div>

    <!-- SCRIPTS -->
    <script>
        // Render all icons on initial page load
        lucide.createIcons();
    </script>
    <script src="../java/main.js"></script>
    <script src="../java/login.js"></script>
</body>
</html>
